name: gyan
description: GYAN — a study motivator and helper app for students.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^8.1.0
  audioplayers: ^6.0.0
  volume_controller: ^3.5.0
  flutter_overlay_window: ^0.5.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.0
  http: ^1.2.0
  flutter_dotenv: ^5.1.0
  image: ^4.1.7
  uuid: ^4.4.0
  firebase_storage: ^13.4.1
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# ── App icon config ───────────────────────────────────────────────────────────
# After adding your PNG to assets/icon/app_icon.png, run:
#   flutter pub get
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1C1C20"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/ # app logo — put app_icon.png here
    - .env
    - assets/audio/ # white noise — rain.mp3 / forest.mp3 / cafe.mp3 / ocean.mp3 / fire.mp3


  # ── Offline font (optional — only if bundling Inder locally) ─────────
  # fonts:
  #   - family: Inder
  #     fonts:
  #       - asset: assets/fonts/Inder-Regular.ttf
